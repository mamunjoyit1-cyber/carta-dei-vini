<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Ristorante Lago Bin – Carta dei Vini</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b8973a;
  --gold-light: #d4af5a;
  --gold-pale: #f5edd8;
  --dark: #1a1410;
  --dark2: #2c2318;
  --dark3: #3d3020;
  --mid: #5c4a2a;
  --cream: #f9f4ec;
  --text: #2c2318;
  --text-light: #6b5840;
  --white: #ffffff;
  --border: rgba(184,151,58,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Montserrat',sans-serif;
  background:var(--cream);
  color:var(--text);
  min-height:100vh;
}

/* HEADER */
.header{
  background:var(--dark);
  padding:28px 20px 20px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  border-bottom:2px solid var(--gold);
}
.header-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,5vw,32px);
  font-weight:300;
  letter-spacing:0.15em;
  color:var(--gold-light);
  text-transform:uppercase;
  margin-bottom:4px;
}
.header-sub{
  font-size:10px;
  letter-spacing:0.3em;
  color:#8a7550;
  text-transform:uppercase;
  margin-bottom:14px;
}
.header-controls{
  display:flex;
  gap:10px;
  max-width:700px;
  margin:0 auto;
  align-items:center;
  flex-wrap:wrap;
  justify-content:center;
}
.search-wrap{
  flex:1;
  min-width:200px;
  position:relative;
}
.search-wrap svg{
  position:absolute;
  left:12px;top:50%;
  transform:translateY(-50%);
  color:#8a7550;
  width:16px;height:16px;
}
#searchInput{
  width:100%;
  padding:9px 12px 9px 36px;
  border:1px solid var(--gold);
  border-radius:4px;
  background:rgba(255,255,255,0.07);
  color:var(--cream);
  font-family:'Montserrat',sans-serif;
  font-size:13px;
  outline:none;
  transition:all 0.2s;
}
#searchInput::placeholder{color:#8a7550}
#searchInput:focus{border-color:var(--gold-light);background:rgba(255,255,255,0.12)}
.lang-select{
  padding:9px 12px;
  border:1px solid var(--gold);
  border-radius:4px;
  background:rgba(255,255,255,0.07);
  color:var(--cream);
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  outline:none;
  cursor:pointer;
  min-width:110px;
}
.lang-select option{background:var(--dark2);color:var(--cream)}

/* CATEGORY TABS */
.cat-bar{
  background:var(--dark2);
  padding:0 16px;
  display:flex;
  gap:0;
  overflow-x:auto;
  scrollbar-width:none;
  border-bottom:1px solid var(--border);
}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{
  padding:12px 16px;
  border:none;
  background:none;
  color:#8a7550;
  font-family:'Montserrat',sans-serif;
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  cursor:pointer;
  white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:all 0.2s;
}
.cat-btn:hover{color:var(--gold-light)}
.cat-btn.active{color:var(--gold-light);border-bottom-color:var(--gold)}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:24px 16px 60px}

/* SECTION */
.section{margin-bottom:32px;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  font-weight:300;
  letter-spacing:0.1em;
  color:var(--gold);
  text-transform:uppercase;
  padding:12px 0 8px;
  border-bottom:1px solid var(--border);
  margin-bottom:12px;
}
.subsection-title{
  font-size:11px;
  letter-spacing:0.2em;
  color:var(--text-light);
  text-transform:uppercase;
  margin:16px 0 10px;
  font-weight:500;
}

/* WINE GRID */
.wine-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
}

/* WINE CARD */
.wine-card{
  background:var(--white);
  border:1px solid #e8dcc8;
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
  transition:all 0.25s;
  display:flex;
  flex-direction:column;
}
.wine-card:hover{
  border-color:var(--gold);
  box-shadow:0 6px 24px rgba(184,151,58,0.15);
  transform:translateY(-2px);
}
.card-img-wrap{
  height:160px;
  background:linear-gradient(135deg,#f5edd8,#ece0c6);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.card-img{
  max-height:150px;
  max-width:90px;
  object-fit:contain;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  transition:transform 0.3s;
}
.wine-card:hover .card-img{transform:scale(1.04)}
.card-img-placeholder{
  width:50px;height:100px;
  background:linear-gradient(180deg,#c8b07a,#8a6a30);
  border-radius:4px 4px 2px 2px;
  opacity:0.35;
}
.zoom-btn{
  position:absolute;
  top:8px;right:8px;
  width:28px;height:28px;
  background:rgba(26,20,16,0.7);
  border:1px solid var(--gold);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--gold-light);
  font-size:12px;
  cursor:pointer;
  opacity:0;
  transition:opacity 0.2s;
  z-index:2;
}
.wine-card:hover .zoom-btn{opacity:1}
.card-body{
  padding:12px 14px;
  flex:1;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.card-name{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;
  font-weight:600;
  color:var(--dark);
  line-height:1.3;
}
.card-sub{
  font-size:11px;
  color:var(--text-light);
  letter-spacing:0.05em;
}
.card-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 14px 12px;
  border-top:1px solid #f0e8d8;
  margin-top:auto;
}
.card-price{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  font-weight:600;
  color:var(--gold);
}
.card-region{
  font-size:10px;
  color:var(--text-light);
  letter-spacing:0.08em;
  text-transform:uppercase;
}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(10,8,5,0.85);
  z-index:1000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  backdrop-filter:blur(6px);
  animation:fadeOverlay 0.2s ease;
}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
.modal-overlay.open{display:flex}
.modal{
  background:var(--white);
  max-width:560px;
  width:100%;
  border-radius:10px;
  overflow:hidden;
  max-height:92vh;
  display:flex;
  flex-direction:column;
  animation:slideUp 0.25s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-img-area{
  background:linear-gradient(135deg,#f5edd8,#e8d8b8);
  height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  flex-shrink:0;
}
.modal-img{
  max-height:240px;
  max-width:160px;
  object-fit:contain;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,0.2));
  cursor:zoom-in;
  transition:transform 0.3s;
}
.modal-img:hover{transform:scale(1.06)}
.modal-close{
  position:absolute;top:12px;right:12px;
  width:34px;height:34px;
  background:rgba(26,20,16,0.75);
  border:1px solid var(--gold);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--gold-light);
  font-size:18px;
  cursor:pointer;
  transition:background 0.2s;
}
.modal-close:hover{background:var(--dark)}
.modal-body{
  padding:20px 24px 24px;
  overflow-y:auto;
  flex:1;
}
.modal-name{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;
  font-weight:600;
  color:var(--dark);
  margin-bottom:4px;
  line-height:1.2;
}
.modal-price{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  color:var(--gold);
  font-weight:600;
  margin-bottom:16px;
}
.modal-details{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 16px;
  margin-bottom:14px;
}
.detail-item{}
.detail-label{
  font-size:10px;
  letter-spacing:0.15em;
  color:#8a7550;
  text-transform:uppercase;
  margin-bottom:2px;
}
.detail-value{
  font-size:13px;
  color:var(--text);
  font-weight:500;
}
.modal-desc{
  font-size:13px;
  line-height:1.7;
  color:var(--text-light);
  border-top:1px solid #f0e8d8;
  padding-top:12px;
  margin-top:4px;
}
.modal-desc p{margin-bottom:8px}
.modal-desc strong{color:var(--mid);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:2px}

/* ZOOM LIGHTBOX */
.lightbox{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.95);
  z-index:2000;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:zoom-out;
}
.lightbox.open{display:flex}
.lightbox img{
  max-width:90vw;
  max-height:90vh;
  object-fit:contain;
  filter:drop-shadow(0 0 40px rgba(184,151,58,0.2));
}
.lightbox-close{
  position:absolute;top:20px;right:24px;
  color:var(--gold);
  font-size:36px;
  cursor:pointer;
  line-height:1;
}

/* NO RESULTS */
.no-results{
  text-align:center;
  padding:60px 20px;
  color:var(--text-light);
}
.no-results svg{margin-bottom:16px;opacity:0.3}
.no-results p{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic}

/* FOOTER */
.footer{
  text-align:center;
  padding:24px;
  font-size:10px;
  letter-spacing:0.2em;
  color:#8a7550;
  text-transform:uppercase;
  border-top:1px solid var(--border);
  background:var(--dark);
  color:#5c4a2a;
}

/* RESPONSIVE */
@media(max-width:480px){
  .wine-grid{grid-template-columns:1fr 1fr}
  .modal-details{grid-template-columns:1fr}
}
@media(max-width:340px){
  .wine-grid{grid-template-columns:1fr}
}
</style>
</head>

<div class="main" id="mainContent"></div>

<div class="footer">© Hotel Ristorante Lago Bin &nbsp;·&nbsp; Powered by Wineappy</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

      <div class="modal-price" id="modalPrice"></div>

// ── CATEGORY CONFIG ────────────────────────────────────────────
const CATS = [
  { id:'all',       label:'Tutti' },
  { id:'lago',      label:'Vini del Lago Bin' },
  { id:'bollicine', label:'Bollicine' },
  { id:'territorio',label:'Vini del Territorio' },
  { id:'bianchi',   label:'Vini Bianchi' },
  { id:'rosati',    label:'Vini Rosati' },
  { id:'rossi',     label:'Vini Rossi' },
];

// ── STATE ──────────────────────────────────────────────────────
let activeCat = 'all';
let searchQ = '';

// ── RENDER ─────────────────────────────────────────────────────
function renderAll(){
  renderCatBar();
  renderWines();
}

function renderCatBar(){
  const bar = document.getElementById('catBar');
  bar.innerHTML = CATS.map(c=>`
    <button class="cat-btn${activeCat===c.id?' active':''}" onclick="setCat('${c.id}')">
      ${c.id==='all'?t('all'):c.label}
    </button>`).join('');
}

function filterWines(){
  searchQ = document.getElementById('searchInput').value.toLowerCase();
  renderWines();
}

function setCat(id){
  activeCat = id;
  searchQ = '';
  document.getElementById('searchInput').value = '';
  renderAll();
}

function getFilteredWines(){
  return WINES.filter(w=>{
    const matchCat = activeCat==='all' || w.cat===activeCat;
    const matchQ = !searchQ ||
      w.name.toLowerCase().includes(searchQ) ||
      (w.uve||'').toLowerCase().includes(searchQ) ||
      (w.regione||'').toLowerCase().includes(searchQ) ||
      (w.paese||'').toLowerCase().includes(searchQ) ||
      (w.desc||'').toLowerCase().includes(searchQ);
    return matchCat && matchQ;
  });
}

function renderWines(){
  const wines = getFilteredWines();
  const main = document.getElementById('mainContent');

  if(wines.length===0){
    main.innerHTML=`<div class="no-results">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="#b8973a"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <p>${t('noRes')}</p>
    </div>`;
    return;
  }

  // Group by subcat
  const groups = {};
  wines.forEach(w=>{
    const g = w.subcat||'—';
    if(!groups[g]) groups[g]=[];
    groups[g].push(w);
  });

  let html = '';
  // Also group by main cat if showing all
  let lastCat = null;
  Object.entries(groups).forEach(([sub,ws])=>{
    const cat = ws[0].cat;
    if(activeCat==='all' && cat!==lastCat){
      const catLabel = CATS.find(c=>c.id===cat);
      if(catLabel){
        html += `<div class="section"><div class="section-title">${catLabel.label}</div>`;
        lastCat = cat;
      }
    } else if(activeCat!=='all' && lastCat===null){
      const catLabel = CATS.find(c=>c.id===activeCat);
      html += `<div class="section"><div class="section-title">${catLabel?catLabel.label:''}</div>`;
      lastCat = activeCat;
    }
    html += `<div class="subsection-title">${sub}</div>`;
    html += `<div class="wine-grid">`;
    ws.forEach(w=>{ html += wineCard(w); });
    html += `</div>`;
  });
  if(lastCat) html += `</div>`;

  main.innerHTML = html;
}

function wineCard(w){
  const imgTag = w.img
    ? `<img class="card-img" src="${w.img}" alt="${w.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
    : '';
  const placeholder = `<div class="card-img-placeholder" ${w.img?'style="display:none"':''}></div>`;
  return `
  <div class="wine-card" onclick="openModal('${w.id}')">
    <div class="card-img-wrap">
      ${imgTag}${placeholder}
      <button class="zoom-btn" onclick="event.stopPropagation();openZoom('${w.img||''}')">⤢</button>
    </div>
    <div class="card-body">
      <div class="card-name">${w.name}</div>
      <div class="card-sub">${[w.paese,w.regione].filter(Boolean).join(' · ')}</div>
      ${w.uve?`<div class="card-sub" style="font-style:italic">${w.uve}</div>`:''}
    </div>
    <div class="card-footer">
      <div class="card-price">€ ${w.price}</div>
      ${w.gradazione?`<div class="card-region">${w.gradazione}</div>`:''}
    </div>
  </div>`;
}

// ── MODAL ──────────────────────────────────────────────────────
function openModal(id){
  const w = WINES.find(x=>x.id===id);
  if(!w) return;

  const img = document.getElementById('modalImg');
  if(w.img){ img.src=w.img; img.style.display='block'; }
  else { img.style.display='none'; }

  document.getElementById('modalName').textContent = w.name;
  document.getElementById('modalPrice').textContent = `€ ${w.price} · 75 Cl`;

  const details = [
    w.paese && [t('paese'), w.paese],
    w.regione && [t('regione'), w.regione],
    w.gradazione && [t('gradazione'), w.gradazione],
    w.uve && [t('uve'), w.uve],
    w.colore && [t('colore'), w.colore],
    w.sigla && [t('sigla'), w.sigla],
  ].filter(Boolean);

  document.getElementById('modalDetails').innerHTML = details.map(([l,v])=>`
    <div class="detail-item">
      <div class="detail-label">${l}</div>
      <div class="detail-value">${v}</div>
    </div>`).join('');

  let descHtml = '';
  if(w.gusto) descHtml += `<p><strong>${t('gusto')}</strong>${w.gusto}</p>`;
  if(w.desc)  descHtml += `<p><strong>${t('desc')}</strong>${w.desc}</p>`;
  if(w.vinif) descHtml += `<p><strong>${t('vinif')}</strong>${w.vinif}</p>`;
  document.getElementById('modalDesc').innerHTML = descHtml;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e.target===document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}

// ── ZOOM ───────────────────────────────────────────────────────
function openZoom(src){
  if(!src) return;
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function openLightbox(src){ openZoom(src); }
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

// ── KEYBOARD ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeModalBtn();
    closeLightbox();
  }
});

// ── INIT ───────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
