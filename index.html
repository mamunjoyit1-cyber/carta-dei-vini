<style>
:root {
  --gold: #b8973a;
  --gold-light: #d4af5a;
  --gold-pale: #f5edd8;
  --dark: #1a1410;
  --dark2: #2c2318;
  --dark3: #3d3020;
  --mid: #5c4a2a;
  --cream: #f9f4ec;
  --text: #2c2318;
  --text-light: #6b5840;
  --white: #ffffff;
  --border: rgba(184,151,58,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Montserrat',sans-serif;
  background:#f0ebe0;
  color:var(--text);
  min-height:100vh;
}

/* ── HEADER ── */
.header{
  background:var(--dark);
  padding:16px 20px 14px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  border-bottom:2px solid var(--gold);
}
.header-top{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin-bottom:10px;
}
.header-logo-img{
  height:48px;
  width:auto;
  object-fit:contain;
  filter:brightness(1.1);
}
.header-logo-img-fallback{
  height:48px;
  width:48px;
  background:var(--gold);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  color:var(--dark);
  font-weight:700;
  display:none;
}
.header-text{}
.header-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,4.5vw,26px);
  font-weight:300;
  letter-spacing:0.12em;
  color:var(--gold-light);
  text-transform:uppercase;
  line-height:1.2;
}
.header-sub{
  font-size:9px;
  letter-spacing:0.25em;
  color:#8a7550;
  text-transform:uppercase;
  margin-top:2px;
}
.header-bottom{
  display:flex;
  gap:10px;
  max-width:700px;
  margin:0 auto;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
}
.search-wrap{
  flex:1;
  min-width:180px;
  position:relative;
}
.search-wrap svg{
  position:absolute;
  left:11px;top:50%;
  transform:translateY(-50%);
  color:#8a7550;
  width:15px;height:15px;
}
#searchInput{
  width:100%;
  padding:8px 10px 8px 33px;
  border:1px solid var(--gold);
  border-radius:4px;
  background:rgba(255,255,255,0.07);
  color:var(--cream);
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  outline:none;
  transition:all 0.2s;
}
#searchInput::placeholder{color:#8a7550}
#searchInput:focus{border-color:var(--gold-light);background:rgba(255,255,255,0.12)}

/* Google Translate widget styling */
#google_translate_element{
  display:inline-block;
}
#google_translate_element .goog-te-combo{
  padding:8px 10px;
  border:1px solid var(--gold) !important;
  border-radius:4px;
  background:rgba(255,255,255,0.07) !important;
  color:var(--cream) !important;
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  outline:none;
  cursor:pointer;
  min-width:120px;
}
.goog-te-banner-frame{display:none!important}
body{top:0!important}

/* ── HINT BAR ── */
.hint-bar{
  background:var(--gold);
  color:var(--dark);
  text-align:center;
  padding:9px 16px;
  font-size:11px;
  font-weight:500;
  letter-spacing:0.06em;
}

/* ── MAIN ── */
.main{max-width:800px;margin:0 auto;padding:16px 12px 60px}

/* ── ACCORDION CATEGORY ── */
.cat-section{
  margin-bottom:8px;
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.cat-header{
  background:var(--gold);
  color:var(--dark);
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  user-select:none;
  transition:background 0.2s;
}
.cat-header:hover{background:var(--gold-light)}
.cat-header-left{
  display:flex;
  align-items:center;
  gap:10px;
}
.cat-icon{font-size:17px}
.cat-label{
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.15em;
  text-transform:uppercase;
}
.cat-count{
  font-size:10px;
  background:rgba(0,0,0,0.15);
  border-radius:10px;
  padding:2px 8px;
  font-weight:500;
}
.cat-arrow{
  font-size:18px;
  transition:transform 0.3s;
  color:var(--dark2);
}
.cat-section.open .cat-arrow{transform:rotate(180deg)}
.cat-body{
  background:var(--white);
  display:none;
  animation:slideDown 0.25s ease;
}
.cat-section.open .cat-body{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── SUBCATEGORY ── */
.subcat-header{
  padding:10px 18px 6px;
  font-size:10px;
  letter-spacing:0.2em;
  color:var(--text-light);
  text-transform:uppercase;
  font-weight:600;
  border-bottom:1px solid #f0e8d8;
  background:#fdfaf5;
}

/* ── WINE LIST ROW ── */
.wine-row{
  display:flex;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #f0e8d8;
  cursor:pointer;
  transition:background 0.15s;
  gap:14px;
}
.wine-row:last-child{border-bottom:none}
.wine-row:hover{background:#fdf7ec}
.wine-row-img{
  width:42px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.wine-row-img img{
  width:36px;
  height:72px;
  object-fit:contain;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}
.wine-row-img-placeholder{
  width:28px;
  height:58px;
  background:linear-gradient(180deg,#d4af5a,#8a6a30);
  border-radius:3px 3px 2px 2px;
  opacity:0.4;
}
.wine-row-info{
  flex:1;
  min-width:0;
}
.wine-row-name{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;
  font-weight:600;
  color:var(--dark);
  line-height:1.3;
  margin-bottom:2px;
}
.wine-row-sub{
  font-size:10px;
  color:var(--gold);
  font-style:italic;
  letter-spacing:0.03em;
}
.wine-row-right{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.wine-row-price{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;
  font-weight:600;
  color:var(--text);
}
.wine-row-arrow{
  color:#c8b07a;
  font-size:18px;
  font-weight:300;
}

/* ── SEARCH RESULTS ── */
.search-results{
  background:var(--white);
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  margin-bottom:8px;
  display:none;
}
.search-results.visible{display:block}
.search-results-title{
  background:var(--dark2);
  color:var(--gold-light);
  padding:10px 16px;
  font-size:11px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  font-weight:500;
}

/* ── NO RESULTS ── */
.no-results{
  text-align:center;
  padding:50px 20px;
  color:var(--text-light);
}
.no-results p{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(10,8,5,0.85);
  z-index:1000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  backdrop-filter:blur(6px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--white);
  max-width:540px;
  width:100%;
  border-radius:10px;
  overflow:hidden;
  max-height:92vh;
  display:flex;
  flex-direction:column;
  animation:slideUp 0.25s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-img-area{
  background:linear-gradient(135deg,#f5edd8,#e8d8b8);
  height:240px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  flex-shrink:0;
}
.modal-img{
  max-height:220px;
  max-width:150px;
  object-fit:contain;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,0.2));
  cursor:zoom-in;
  transition:transform 0.3s;
}
.modal-img:hover{transform:scale(1.06)}
.modal-close{
  position:absolute;top:12px;right:12px;
  width:34px;height:34px;
  background:rgba(26,20,16,0.75);
  border:1px solid var(--gold);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--gold-light);
  font-size:18px;
  cursor:pointer;
  transition:background 0.2s;
  z-index:2;
}
.modal-close:hover{background:var(--dark)}
.modal-body{
  padding:18px 22px 22px;
  overflow-y:auto;
  flex:1;
}
.modal-name{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  font-weight:600;
  color:var(--dark);
  margin-bottom:3px;
  line-height:1.2;
}
.modal-price{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;
  color:var(--gold);
  font-weight:600;
  margin-bottom:14px;
}
.modal-details{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 14px;
  margin-bottom:14px;
}
.detail-label{
  font-size:9px;
  letter-spacing:0.15em;
  color:#8a7550;
  text-transform:uppercase;
  margin-bottom:2px;
}
.detail-value{
  font-size:12px;
  color:var(--text);
  font-weight:500;
}
.modal-desc{
  font-size:12px;
  line-height:1.7;
  color:var(--text-light);
  border-top:1px solid #f0e8d8;
  padding-top:12px;
}
.modal-desc p{margin-bottom:8px}
.modal-desc strong{color:var(--mid);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:2px}

/* ── LIGHTBOX ── */
.lightbox{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.95);
  z-index:2000;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:zoom-out;
}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
.lightbox-close{
  position:absolute;top:20px;right:24px;
  color:var(--gold);font-size:36px;cursor:pointer;line-height:1;
}

/* ── FOOTER ── */
.footer{
  text-align:center;
  padding:20px;
  font-size:9px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  border-top:1px solid var(--border);
  background:var(--dark);
  color:#5c4a2a;
}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .modal-details{grid-template-columns:1fr}
  .cat-label{font-size:10px;letter-spacing:0.1em}
}
</style>
</head>

// ── CATEGORIES CONFIG ─────────────────────────────────────────
const CATS = [
  { id:'lago',       label:'Vini del Lago Bin',    icon:'🏔️' },
  { id:'bollicine',  label:'Bollicine',             icon:'🥂' },
  { id:'territorio', label:'Vini del Territorio',   icon:'🌿' },
  { id:'bianchi',    label:'Vini Bianchi',          icon:'🍋' },
  { id:'rosati',     label:'Vini Rosati',           icon:'🌸' },
  { id:'rossi',      label:'Vini Rossi',            icon:'🍷' },
];

// ── STATE ─────────────────────────────────────────────────────
let openCats = new Set();
let searchQ = '';

// ── RENDER ────────────────────────────────────────────────────
function renderAll() {
  const main = document.getElementById('mainContent');
  const isSearch = searchQ.trim().length > 0;

  if (isSearch) {
    // Search mode: flat list
    const results = getFilteredWines();
    if (results.length === 0) {
      main.innerHTML = `<div class="no-results"><p>Nessun vino trovato</p></div>`;
      return;
    }
    let html = `<div class="cat-section open">
      <div class="cat-header" style="cursor:default">
        <div class="cat-header-left">
          <span class="cat-icon">🔍</span>
          <span class="cat-label">Risultati ricerca</span>
          <span class="cat-count">${results.length}</span>
        </div>
      </div>
      <div class="cat-body">`;
    results.forEach(w => { html += wineRow(w); });
    html += `</div></div>`;
    main.innerHTML = html;
    return;
  }

  // Normal accordion mode
  let html = '';
  CATS.forEach(cat => {
    const wines = WINES.filter(w => w.cat === cat.id);
    if (wines.length === 0) return;
    const isOpen = openCats.has(cat.id);

    // Group by subcat
    const groups = {};
    wines.forEach(w => {
      const g = w.subcat || '—';
      if (!groups[g]) groups[g] = [];
      groups[g].push(w);
    });

    html += `<div class="cat-section${isOpen ? ' open' : ''}" id="cat-${cat.id}">
      <div class="cat-header" onclick="toggleCat('${cat.id}')">
        <div class="cat-header-left">
          <span class="cat-icon">${cat.icon}</span>
          <span class="cat-label">${cat.label}</span>
          <span class="cat-count">${wines.length}</span>
        </div>
        <span class="cat-arrow">▾</span>
      </div>
      <div class="cat-body">`;

    Object.entries(groups).forEach(([sub, ws]) => {
      html += `<div class="subcat-header">${sub}</div>`;
      ws.forEach(w => { html += wineRow(w); });
    });

    html += `</div></div>`;
  });

  main.innerHTML = html;
}

function toggleCat(id) {
  if (openCats.has(id)) {
    openCats.delete(id);
  } else {
    openCats.add(id);
  }
  renderAll();
}

function filterWines() {
  searchQ = document.getElementById('searchInput').value.toLowerCase();
  renderAll();
}

function getFilteredWines() {
  return WINES.filter(w => {
    return !searchQ ||
      w.name.toLowerCase().includes(searchQ) ||
      (w.uve || '').toLowerCase().includes(searchQ) ||
      (w.regione || '').toLowerCase().includes(searchQ) ||
      (w.paese || '').toLowerCase().includes(searchQ) ||
      (w.desc || '').toLowerCase().includes(searchQ) ||
      (w.subcat || '').toLowerCase().includes(searchQ);
  });
}

function wineRow(w) {
  const subLabel = [w.uve, w.regione ? w.regione : w.paese].filter(Boolean).join(' · ');
  const imgHtml = w.img
    ? `<img src="${w.img}" alt="${w.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="wine-row-img-placeholder" style="display:none"></div>`
    : `<div class="wine-row-img-placeholder"></div>`;
  return `
  <div class="wine-row" onclick="openModal('${w.id}')">
    <div class="wine-row-img">${imgHtml}</div>
    <div class="wine-row-info">
      <div class="wine-row-name">${w.name}</div>
      ${subLabel ? `<div class="wine-row-sub">${subLabel}</div>` : ''}
    </div>
    <div class="wine-row-right">
      <div class="wine-row-price">€ ${w.price}</div>
      <div class="wine-row-arrow">›</div>
    </div>
  </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(id) {
  const w = WINES.find(x => x.id === id);
  if (!w) return;

  const img = document.getElementById('modalImg');
  if (w.img) { img.src = w.img; img.style.display = 'block'; }
  else { img.style.display = 'none'; }

  document.getElementById('modalName').textContent = w.name;
  document.getElementById('modalPrice').textContent = `€ ${w.price} · 75 cl`;

  const details = [
    w.paese     && ['Paese', w.paese],
    w.regione   && ['Regione', w.regione],
    w.gradazione && ['Gradazione', w.gradazione],
    w.uve       && ['Uve', w.uve],
    w.colore    && ['Colore', w.colore],
    w.sigla     && ['Sigla', w.sigla],
  ].filter(Boolean);

  document.getElementById('modalDetails').innerHTML = details.map(([l, v]) => `
    <div>
      <div class="detail-label">${l}</div>
      <div class="detail-value">${v}</div>
    </div>`).join('');

  let descHtml = '';
  if (w.gusto) descHtml += `<p><strong>Gusto</strong>${w.gusto}</p>`;
  if (w.desc)  descHtml += `<p><strong>Descrizione</strong>${w.desc}</p>`;
  if (w.vinif) descHtml += `<p><strong>Vinificazione</strong>${w.vinif}</p>`;
  document.getElementById('modalDesc').innerHTML = descHtml;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function openLightbox(src) {
  if (!src) return;
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModalBtn(); closeLightbox(); }
});

// ── INIT ──────────────────────────────────────────────────────
renderAll();
</script>
